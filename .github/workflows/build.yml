name: Lint Check
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Verify repo structure
      run: |
        echo "=== Node.js ==="
        test -f nodejs/index.js && echo "nodejs/index.js: OK" || echo "nodejs/index.js: MISSING"
        test -f nodejs/package.json && echo "nodejs/package.json: OK" || echo "nodejs/package.json: MISSING"
        echo "=== Python ==="
        test -f python/app.py && echo "python/app.py: OK" || echo "python/app.py: MISSING"
        test -f python/requirements.txt && echo "python/requirements.txt: OK" || echo "python/requirements.txt: MISSING"
