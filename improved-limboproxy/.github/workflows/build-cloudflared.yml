name: Build cloudflared shared library

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'native/cloudflared/**'

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build .so for ${{ matrix.arch }}
        run: |
          cd native/cloudflared
          bash build.sh ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: bot-${{ matrix.arch }}.so
          path: native/cloudflared/bot-${{ matrix.arch }}.so

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bot-*
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp bot-amd64.so release/bot-amd64.so
          cp bot-arm64.so release/bot-arm64.so

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "release/*.so"
          tag: libbot-latest
          name: "cloudflared-lib build"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          body: "Auto-built from commit ${{ github.sha }}"
